version: 2
project_name: mework

before:
  hooks:
    - go mod tidy

builds:
  - id: mework
    main: ./apps/mework
    binary: mework
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

  - id: mework-server
    main: ./apps/mework-server
    binary: mework-server
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

  - id: mework-mezon-worker
    main: ./apps/mework-mezon-worker
    binary: mework-mezon-worker
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

  - id: mework-mcp
    dir: ./libs/mcp-server
    main: .
    binary: mework-mcp
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "mework-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    ids:
      - mework
      - mework-server
      - mework-mezon-worker
      - mework-mcp
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

# No snapshot block needed — version comes from tag by default.

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(c[0-9]"
